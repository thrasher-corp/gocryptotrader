name: codespell
on: [push, pull_request]
jobs:
  codespell:
    name: Spell checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: codespell-project/actions-codespell@master
        with:
          args: --dictionary=-,./contrib/spellcheck/codespell_custom_dictionary.txt
